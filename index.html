<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crew Control Center</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1020;
    color: white;
  }

  h1 {
    text-align: center;
    padding: 15px;
    color: #7dd3fc;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 15px;
  }

  .panel {
    background: #121a33;
    padding: 15px;
    border-radius: 12px;
    min-height: 400px;
  }

  .crew-card {
    background: #1e2a4a;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
  }

  .eva {
    border-left: 4px solid #22c55e;
  }

  .not-eva {
    border-left: 4px solid #ef4444;
  }

  button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #38bdf8;
    font-weight: bold;
  }

  button:hover {
    background: #0ea5e9;
  }

  .output {
    background: #0f172a;
    padding: 10px;
    border-radius: 8px;
    height: 100%;
    overflow-y: auto;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<h1>🚀 Space Mission Crew Control Center</h1>

<div class="container">

  <div class="panel">
    <h2>👨‍🚀 Crew</h2>
    <div id="crewList"></div>
  </div>

  <div class="panel">
    <h2>⚙️ Controls</h2>
    <button onclick="showEVA()">EVA Ready Crew</button>
    <button onclick="sortCrew()">Sort by Priority</button>
    <button onclick="swap()">Swap Members</button>
    <button onclick="chunk()">Chunk Crew</button>
    <button onclick="report()">Generate Report</button>
  </div>

  <div class="panel">
    <h2>📡 Output</h2>
    <div id="output" class="output"></div>
  </div>

</div>

<script>
// ---------------- DATA ----------------
const squad = [];

const firstAstronaut = {
  id: 1,
  name: "Andy",
  role: "Commander",
  isEVAEligible: true,
  priority: 3
};

function addCrewMember(crew, astronaut) {
  for (let i = 0; i < crew.length; i++) {
    if (crew[i].id === astronaut.id) return;
  }
  crew.push(astronaut);
}

addCrewMember(squad, firstAstronaut);

const remainingCrew = [
  { id: 2, name: "Bart", role: "Pilot", isEVAEligible: false, priority: 8 },
  { id: 3, name: "Caroline", role: "Engineer", isEVAEligible: true, priority: 4 },
  { id: 4, name: "Diego", role: "Scientist", isEVAEligible: false, priority: 1 },
  { id: 5, name: "Elise", role: "Medic", isEVAEligible: true, priority: 7 },
  { id: 6, name: "Felix", role: "Navigator", isEVAEligible: true, priority: 6 },
];

for (let i = 0; i < remainingCrew.length; i++) {
  addCrewMember(squad, remainingCrew[i]);
}

let currentCrew = squad;

// ---------------- LOGIC FUNCTIONS ----------------

function sortByPriorityDescending(crew) {
  for (let i = 0; i < crew.length - 1; i++) {
    for (let j = 0; j < crew.length - 1 - i; j++) {
      if (crew[j].priority < crew[j + 1].priority) {
        let temp = crew[j];
        crew[j] = crew[j + 1];
        crew[j + 1] = temp;
      }
    }
  }
}

function getEVAReadyCrew(crew) {
  const result = [];
  for (let i = 0; i < crew.length; i++) {
    if (crew[i].isEVAEligible) result.push(crew[i]);
  }
  sortByPriorityDescending(result);
  return result;
}

function chunkCrew(crew, size) {
  const chunks = [];
  for (let i = 0; i < crew.length; i += size) {
    chunks.push(crew.slice(i, i + size));
  }
  return chunks;
}

// ---------------- UI ----------------

function renderCrew() {
  const container = document.getElementById("crewList");
  container.innerHTML = "";

  for (let i = 0; i < currentCrew.length; i++) {
    const a = currentCrew[i];

    const div = document.createElement("div");
    div.className = "crew-card " + (a.isEVAEligible ? "eva" : "not-eva");

    div.innerHTML = `
      <strong>${a.name}</strong><br>
      ${a.role} | Priority ${a.priority}
    `;

    container.appendChild(div);
  }
}

function log(text) {
  document.getElementById("output").innerText += text + "\n";
}

// ---------------- BUTTONS ----------------

function showEVA() {
  const eva = getEVAReadyCrew(currentCrew);
  log("=== EVA READY ===");
  eva.forEach(a => log(a.name));
}

function sortCrew() {
  sortByPriorityDescending(currentCrew);
  renderCrew();
}

function swap() {
  let copy = currentCrew.slice();
  let temp = copy[1];
  copy[1] = copy[3];
  copy[3] = temp;
  currentCrew = copy;
  renderCrew();
}

function chunk() {
  const chunks = chunkCrew(currentCrew, 2);

  log("=== CHUNKS ===");
  for (let i = 0; i < chunks.length; i++) {
    log("Chunk " + (i + 1));
    for (let j = 0; j < chunks[i].length; j++) {
      log("- " + chunks[i][j].name);
    }
  }
}

function report() {
  log("=== REPORT ===");
  for (let i = 0; i < currentCrew.length; i++) {
    log(currentCrew[i].name);
  }
}

// initial render
renderCrew();

</script>

</body>
</html>
